input:focus,textarea:focus{outline:none}

@keyframes fadeUp{from{opacity:0;transform:translateY(16px)}to{opacity:1;transform:translateY(0)}}
@keyframes fadeIn{from{opacity:0}to{opacity:1}}
@keyframes pulseGold { 0% { opacity: 0.25; transform: scale(1); } 50% { opacity: 0.6; transform: scale(1.05); } 100% { opacity: 0.25; transform: scale(1); } }

.btn-gold{background:linear-gradient(135deg,#c9a84c,#e8c96d);color:#0a0a0f;border:none;font-weight:600;letter-spacing:.4px;transition:all .2s;display:flex;align-items:center;justify-content:center;gap:8px}
.btn-gold:active{transform:scale(0.96)}
.btn-ghost{background:transparent;color:#c9a84c;border:1px solid #c9a84c44;font-weight:500;transition:all .2s}

.input-field{width:100%;padding:12px 14px;background:#13131a;border:1px solid #2a2a3a;border-radius:8px;color:#e8e4dc;font-size:16px;transition:border-color .2s}
.input-field:focus{border-color:#c9a84c}

.tab-btn { flex:1; padding:12px; text-align:center; font-weight:600; font-size:14px; border-bottom:2px solid transparent; color:#555; transition:all 0.2s; background:transparent; border:none; }
.tab-btn.active { border-bottom-color:#c9a84c; color:#c9a84c; }

.filter-label { font-size:10px; color:#555; letter-spacing:1.5px; text-transform:uppercase; min-width:85px; font-weight:700; }
.chip { font-size:11px; padding:6px 12px; border-radius:6px; border:1px solid #2a2a3a; background:transparent; color:#888; transition:all 0.2s; white-space:nowrap; }
.chip.active { background:rgba(201,168,76,0.15); border-color:#c9a84c; color:#c9a84c; font-weight:600; }

.card { transition: transform 0.2s ease; cursor: pointer; background: #0f0f18; border-radius: 12px; overflow: hidden; border: 1px solid #1e1e2a; position: relative; }
.card:active { transform: scale(0.97); }

.placeholder-card { border: 2px dashed rgba(201,168,76,0.15); border-radius: 12px; aspect-ratio: 2/3; display: flex; flex-direction: column; align-items: center; justify-content: center; text-align: center; padding: 20px; color: rgba(201,168,76,0.4); transition: all 0.3s; cursor: pointer; position: relative; z-index: 10;}
.placeholder-card:hover { border-color: rgba(201,168,76,0.6); color: rgba(201,168,76,0.9); background: rgba(201,168,76,0.04); box-shadow: 0 0 20px rgba(201,168,76,0.05); }

.modal-overlay { position:fixed; top:0; left:0; right:0; bottom:0; background:rgba(0,0,0,0.95); z-index:2000; display:flex; align-items:center; justify-content:center; animation:fadeIn .2s ease; padding:20px; }
.modal-content { background:#0f0f18; border:1px solid #2a2a3a; border-radius:20px; width:100%; max-width:520px; max-height:90vh; overflow-y:auto; animation:fadeUp .25s ease; box-shadow:0 10px 50px rgba(0,0,0,0.9); }

.stat-card { background:#13131a; padding:16px; border-radius:12px; border:1px solid rgba(201,168,76,0.25); text-align:center; }
.stat-card:hover { border-color: rgba(201,168,76,0.5); }

.tag { font-size:10px; color:#c9a84c; letter-spacing:1px; text-transform:uppercase; font-weight:600; background:rgba(201,168,76,.12); border:1px solid rgba(201,168,76,.3); border-radius:4px; padding:2px 8px; }
.meta-label { font-size:10px; color:#555; letter-spacing:1.5px; text-transform:uppercase; margin-bottom:3px; display:block; }
.close-btn { background:#1a1a28; border:1px solid #2a2a3a; border-radius:50%; width:32px; height:32px; color:#888; display:flex; align-items:center; justify-content:center; transition: all 0.2s; }
.close-btn:hover { color:#c9a84c; border-color:#c9a84c; }

.search-result-item { display:flex; gap:12px; padding:10px; border-bottom:1px solid #2a2a3a; cursor:pointer; }

const StarRating = ({ value, onChange, readonly = false, size = 24 }) => (
  <div style={{display:'flex', gap:'4px', alignItems:'center'}}>
    {[1,2,3,4,5].map(i => {
      const isFull = value >= i;
      const isHalf = value >= i - 0.5 && value < i;
      return (
        <div key={i} style={{position:'relative', width:`${size}px`, height:`${size}px`, cursor:readonly?'default':'pointer'}}

          <svg viewBox="0 0 24 24" width="100%" height="100%">
            <path d="M12 17.27L18.18 21l-1.64-7.03L22 9.24l-7.19-.61L12 2 9.19 8.63 2 9.24l5.46 4.73L5.82 21z" 
                  fill={isFull ? '#c9a84c' : isHalf ? '#c9a84c88' : '#2a2a3a'} />
          </svg>
        </div>
      );
    })}
  </div>
);

/* ── BARCODE SCANNER ── */
const BarcodeScanner = ({ onDetected, onClose }) => {
  const videoRef = React.useRef(null);
  const [status, setStatus] = React.useState("Avvio fotocamera...");
  const [scanning, setScanning] = React.useState(true);
  const codeReaderRef = React.useRef(null);

  React.useEffect(() => {
    let stopped = false;
    const startScanner = async () => {
      try {
        const ZXing = window.ZXing;
        if (!ZXing) { setStatus("Libreria scanner non disponibile"); return; }
        const hints = new Map();
        hints.set(ZXing.DecodeHintType.POSSIBLE_FORMATS, [
          ZXing.BarcodeFormat.EAN_13,
          ZXing.BarcodeFormat.EAN_8,
          ZXing.BarcodeFormat.UPC_A,
          ZXing.BarcodeFormat.UPC_E,
        ]);
        const codeReader = new ZXing.BrowserMultiFormatReader(hints);
        codeReaderRef.current = codeReader;

        setStatus("Inquadra il barcode del DVD/Blu-ray");
        // Use constraints directly — works in all ZXing versions
        await codeReader.decodeFromConstraints(
          { video: { facingMode: { ideal: 'environment' } } },
          videoRef.current,
          (result, err) => {
            if (stopped) return;
            if (result) {
              stopped = true;
              setScanning(false);
              setStatus("✅ Codice rilevato!");
              codeReader.reset();
              onDetected(result.getText());
            }
          }
        );
      } catch (e) {
        console.error(e);
        setStatus("Errore: " + (e.message || "Accesso fotocamera negato"));
      }
    };
    startScanner();
    return () => {
      stopped = true;
      if (codeReaderRef.current) { try { codeReaderRef.current.reset(); } catch(_) {} }
    };
  }, []);

  return (
    <div className="modal-overlay" onClick={onClose} style={{zIndex:3000}}>
      <div onClick={e => e.stopPropagation()} style={{background:'#0f0f18', border:'1px solid rgba(201,168,76,0.4)', borderRadius:'20px', padding:'20px', width:'100%', maxWidth:'420px', display:'flex', flexDirection:'column', alignItems:'center', gap:'14px'}}>
        <div style={{display:'flex', justifyContent:'space-between', width:'100%', alignItems:'center'}}>
          <h3 style={{color:'#c9a84c', fontFamily:"'Playfair Display',serif", fontSize:'18px'}}>📷 Scansiona Barcode</h3>
          <button onClick={onClose} className="close-btn">✕</button>
        </div>
        <div style={{position:'relative', width:'100%', borderRadius:'12px', overflow:'hidden', background:'#000', aspectRatio:'4/3'}}>
          <video ref={videoRef} style={{width:'100%', height:'100%', objectFit:'cover'}} autoPlay muted playsInline />
          {/* aiming lines */}
          <div style={{position:'absolute', inset:0, display:'flex', alignItems:'center', justifyContent:'center', pointerEvents:'none'}}>
            <div style={{width:'70%', height:'2px', background:'rgba(201,168,76,0.7)', boxShadow:'0 0 8px rgba(201,168,76,0.8)'}} />
          </div>
          <div style={{position:'absolute', top:'50%', left:'50%', transform:'translate(-50%,-50%)', width:'70%', height:'40%', border:'2px solid rgba(201,168,76,0.5)', borderRadius:'8px', pointerEvents:'none'}} />
        </div>
        <p style={{fontSize:'13px', color:'#888', textAlign:'center'}}>{status}</p>
        {!scanning && <button onClick={onClose} className="btn-gold" style={{padding:'10px 24px', borderRadius:'8px'}}>Chiudi</button>}
      </div>
    </div>
  );
};

const MovieForm = ({ onSave, onClose, initialData, lang, activeTab }) => {
  const t = translations[lang];
  const [form, setForm] = useState(initialData || { tipo: activeTab === "film" ? "film" : "serie", titolo: "", regista: "", cast: "", anno: "", durata: "", genere: "", trama: "", poster: "", link: "", visto: false, voto: 0, note: "", serie: "" });
  const [tmdbResults, setTmdbResults] = useState([]);
  const [isSearching, setIsSearching] = useState(false);
  const [tvData, setTvData] = useState(null);
  const [showScanner, setShowScanner] = useState(false);

  const handleBarcode = async (code) => {
    setShowScanner(false);
    setIsSearching(true);
    try {
      // 1. UPC lookup to get product title
      const upcRes = await fetch(`https://api.upcitemdb.com/prod/trial/lookup?upc=${code}`);
      const upcData = await upcRes.json();
      const item = upcData.items?.[0];
      let title = "";
      if (item?.title) {
        // Strip common suffixes like "[Blu-ray]", "(DVD)", etc.
        title = item.title.replace(/\s*[\[(].*?[\])]|\s*-\s*(blu.?ray|dvd|4k|uhd|steelbook).*/gi, "").trim();
      }
      if (title) {
        setForm(f => ({ ...f, titolo: title }));
        // 2. Auto-search TMDB with recovered title
        const apiKey = localStorage.getItem('framevault-tmdb-key');
        if (apiKey) {
          const langParam = lang === 'it' ? 'it-IT' : 'en-US';
          const tmdbRes = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${apiKey}&query=${encodeURIComponent(title)}&language=${langParam}`);
          if (tmdbRes.ok) {
            const tmdbData = await tmdbRes.json();
            const filtered = (tmdbData.results || []).filter(r => r.media_type === 'movie' || r.media_type === 'tv').slice(0, 6);
            setTmdbResults(filtered);
          }
        }
      } else {
        alert(`Codice ${code} rilevato, ma prodotto non trovato nel database. Inserisci il titolo manualmente.`);
      }
    } catch(e) {
      console.error(e);
      alert(`Codice rilevato: ${code}\nImpossibile recuperare il titolo. Inseriscilo manualmente.`);
    }
    setIsSearching(false);
  };

  const searchTMDB = async () => {
    if (!form.titolo) return;
    const apiKey = localStorage.getItem('framevault-tmdb-key');
    if (!apiKey) { alert("Inserisci la chiave API TMDB nelle Impostazioni ⚙️"); return; }
    setIsSearching(true);
    try {
      const langParam = lang === 'it' ? 'it-IT' : 'en-US';
      const res = await fetch(`https://api.themoviedb.org/3/search/multi?api_key=${apiKey}&query=${encodeURIComponent(form.titolo)}&language=${langParam}`);
      if (!res.ok) { alert(`Errore TMDB (${res.status}): chiave API non valida o scaduta.`); setIsSearching(false); return; }
      const data = await res.json();
      const filteredResults = (data.results || []).filter(r => r.media_type === 'movie' || r.media_type === 'tv').slice(0, 6);
      setTmdbResults(filteredResults);
    } catch (e) { 
        console.error(e);
        alert("TMDB Error - Controlla la connessione o la chiave API"); 
    }
    setIsSearching(false);
  };

  const selectResult = async (res) => {
    setTmdbResults([]);
    setIsSearching(true);
    setTvData(null);
    const apiKey = localStorage.getItem('framevault-tmdb-key');
    if (!apiKey) { setIsSearching(false); return; }
    try {
      const langParam = lang === 'it' ? 'it-IT' : 'en-US';
      const detailRes = await fetch(`https://api.themoviedb.org/3/${res.media_type === 'movie' ? 'movie' : 'tv'}/${res.id}?api_key=${apiKey}&language=${langParam}&append_to_response=credits`);
      const d = await detailRes.json();
      const director = res.media_type === "movie" ? d.credits?.crew?.find(c => c.job === "Director")?.name : d.created_by?.[0]?.name;
      const cast = d.credits?.cast?.slice(0, 5).map(c => c.name).join(", ");
      
      if (res.media_type === 'tv') {
         const seasons = d.seasons ? d.seasons.filter(s => s.season_number > 0) : [];
         setTvData({ ...d, seasons });
         setForm(f => ({ 
             ...f, 
             tipo: 'serie', 
             titolo: d.name, 
             serie: d.name, 
             anno: (d.first_air_date || "").split("-")[0], 
             genere: d.genres?.map(g => g.name).join(", "), 
             trama: d.overview, 
             poster: d.poster_path ? `https://image.tmdb.org/t/p/w500${d.poster_path}` : f.poster, 
             regista: director || "",
             cast: cast || "",
             durata: d.number_of_episodes ? `${d.number_of_episodes} ep.` : ""
         }));
      } else {
         setForm(f => ({ 
             ...f, 
             tipo: 'film', 
             titolo: d.title || d.name, 
             anno: (d.release_date || d.first_air_date || "").split("-")[0], 
             genere: d.genres?.map(g => g.name).join(", "), 
             trama: d.overview, 
             poster: d.poster_path ? `https://image.tmdb.org/t/p/w500${d.poster_path}` : f.poster, 
             regista: director || "",
             cast: cast || "",
             durata: d.runtime ? `${d.runtime} min` : ""
         }));
      }
    } catch (e) { console.error("Errore dettagli TMDB:", e); }
    setIsSearching(false);
  };

  const handleSeasonChange = (val) => {
     if (!tvData) return;
     if (val === 'all') {
        setForm(f => ({
           ...f,
           titolo: tvData.name,
           anno: (tvData.first_air_date || "").split("-")[0],
           durata: tvData.number_of_episodes ? `${tvData.number_of_episodes} ep.` : "",
           poster: tvData.poster_path ? `https://image.tmdb.org/t/p/w500${tvData.poster_path}` : f.poster,
           trama: tvData.overview
        }));
     } else {
        const season = tvData.seasons.find(s => s.season_number.toString() === val);
        if (season) {
           setForm(f => ({
              ...f,
              titolo: `${tvData.name} - ${season.name}`,
              anno: (season.air_date || tvData.first_air_date || "").split("-")[0],
              durata: season.episode_count ? `${season.episode_count} ep.` : "",
              poster: season.poster_path ? `https://image.tmdb.org/t/p/w500${season.poster_path}` : (tvData.poster_path ? `https://image.tmdb.org/t/p/w500${tvData.poster_path}` : f.poster),
              trama: season.overview || tvData.overview
           }));
        }
     }
  };

  return (
    <div className="modal-overlay" onClick={onClose}>
      <div className="modal-content" onClick={e => e.stopPropagation()} style={{padding:'24px', border:'1px solid rgba(201,168,76,0.3)'}}>
        <div style={{display:'flex', justifyContent:'space-between', alignItems:'center', marginBottom:'20px'}}>
           <h2 style={{color:'#c9a84c', fontFamily:"'Playfair Display',serif"}}>{initialData ? "Modifica Titolo" : t.add}</h2>
           <button onClick={onClose} className="close-btn">✕</button>
        </div>
        
        <div style={{display:'flex', gap:'8px', marginBottom:'15px'}}>
           <input className="input-field" placeholder={t.placeholderTitle} value={form.titolo} onChange={e => setForm({...form, titolo: e.target.value})} />
           <button onClick={() => setShowScanner(true)} title="Scansiona barcode" className="btn-ghost" style={{padding:'0 13px', borderRadius:'8px', fontSize:'18px', flexShrink:0}}>📷</button>
           <button onClick={searchTMDB} disabled={isSearching} className="btn-gold" style={{padding:'0 15px', borderRadius:'8px', flexShrink:0}}>{isSearching ? "..." : "🔍"}</button>
        </div>

        {showScanner && <BarcodeScanner onDetected={handleBarcode} onClose={() => setShowScanner(false)} />}

        {tmdbResults.length > 0 && (
          <div style={{background:'#13131a', borderRadius:'8px', marginBottom:'15px', border:'1px solid #c9a84c44', overflow:'hidden'}}>
            {tmdbResults.map(r => {
              const isMovie = r.media_type === 'movie';
              return (
                <div key={r.id} onClick={() => selectResult(r)} className="search-result-item">
                  <img src={r.poster_path ? `https://image.tmdb.org/t/p/w92${r.poster_path}` : ""} style={{width:'30px', height:'45px', objectFit:'cover', borderRadius:'4px'}} />
                  <div style={{display:'flex', flexDirection:'column', justifyContent:'center'}}>
                    <div style={{fontSize:'13px', fontWeight:'600', color:'#e8e4dc'}}>{isMovie ? '🎬' : '📺'} {r.title || r.name}</div>
                    <div style={{fontSize:'11px', color:'#888'}}>{(r.release_date || r.first_air_date || "").split("-")[0]} • {isMovie ? 'Film' : 'Serie TV'}</div>
                  </div>
                </div>
              );
            })}
          </div>
        )}

        {tvData && tvData.seasons && tvData.seasons.length > 0 && (
          <div style={{marginBottom:'15px', background:'rgba(201,168,76,0.05)', padding:'12px', borderRadius:'8px', border:'1px solid rgba(201,168,76,0.3)'}}>
             <label className="meta-label" style={{color:'#c9a84c'}}>{t.selectSeason}</label>
             <select className="input-field" onChange={e => handleSeasonChange(e.target.value)} style={{marginTop:'5px', background:'#0a0a0f'}}>
                <option value="all">{t.completeSeries} ({tvData.number_of_episodes} ep.)</option>
                {tvData.seasons.map(s => (
                   <option key={s.id} value={s.season_number}>{s.name} ({s.episode_count} ep.)</option>
                ))}
             </select>
          </div>
        )}

        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px', marginBottom:'10px'}}>
           <div><label className="meta-label">{form.tipo === 'film' ? t.director : t.creator}</label><input className="input-field" value={form.regista} onChange={e => setForm({...form, regista: e.target.value})} /></div>
           <div><label className="meta-label">{t.year}</label><input className="input-field" value={form.anno} onChange={e => setForm({...form, anno: e.target.value})} /></div>
        </div>

        <div style={{marginBottom:'10px'}}><label className="meta-label">{t.actor}</label><input className="input-field" value={form.cast} onChange={e => setForm({...form, cast: e.target.value})} /></div>
        
        <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px', marginBottom:'10px'}}>
           <div><label className="meta-label">{t.genre}</label><input className="input-field" value={form.genere} onChange={e => setForm({...form, genere: e.target.value})} /></div>
           <div><label className="meta-label">{t.duration}</label><input className="input-field" value={form.durata} onChange={e => setForm({...form, durata: e.target.value})} /></div>
        </div>

        <div style={{marginBottom:'10px'}}><label className="meta-label">{t.sagaLabel}</label><input className="input-field" value={form.serie} onChange={e => setForm({...form, serie: e.target.value})} /></div>
        
        <div style={{marginBottom:'10px'}}><label className="meta-label">{t.summary}</label><textarea className="input-field" value={form.trama} onChange={e => setForm({...form, trama: e.target.value})} rows="3" style={{resize:'none'}} /></div>

        <div style={{marginBottom:'10px'}}><label className="meta-label">{t.streamingLink}</label><input className="input-field" placeholder="https://..." value={form.link} onChange={e => setForm({...form, link: e.target.value})} /></div>

        <div style={{marginBottom:'15px'}}><label className="meta-label">Poster URL</label><input className="input-field" placeholder={t.placeholderPoster} value={form.poster} onChange={e => setForm({...form, poster: e.target.value})} /></div>

        <button onClick={() => setForm({...form, visto: !form.visto})} style={{width:'100%', padding:'12px', borderRadius:'8px', background: form.visto ? '#c9a84c22' : 'transparent', border:`1px solid ${form.visto ? '#c9a84c' : '#2a2a3a'}`, color: form.visto ? '#c9a84c' : '#555', marginBottom:'12px', fontWeight:600}}>
            {form.visto ? "✅ " + t.watched : "👁️ " + t.toWatch}

        {form.visto && (
          <div style={{background:'#13131a', padding:'15px', borderRadius:'10px', marginBottom:'15px', border:'1px solid rgba(201,168,76,0.2)'}}>

             <StarRating value={form.voto} onChange={v => setForm({...form, voto: v})} size={32} />

          </div>
        )}

        <button className="btn-gold" onClick={() => onSave(form)} style={{width:'100%', padding:'14px', borderRadius:'8px', fontSize:'16px'}}>💾 {t.save}</button>
      </div>
    </div>
  );
};


/* ── APP PRINCIPALE ── */
const App = () => {
  const [lang, setLang] = useState(() => {
    const saved = localStorage.getItem('framevault-lang');
    if (saved && translations[saved]) return saved;
    const browserLang = navigator.language.split('-')[0];
    return translations[browserLang] ? browserLang : 'en';
  });
  const t = translations[lang];

  const changeLang = (newLang) => {
    setLang(newLang);
    localStorage.setItem('framevault-lang', newLang);
  };

  const [movies, setMovies] = useState(() => {
    try {
      const stored = localStorage.getItem(KEY);
      return stored ? JSON.parse(stored) : [];
    } catch (e) {
      console.error("Database corrotto o illeggibile", e);
      return [];
    }
  });

  const [activeTab, setActiveTab] = useState("film");
  const [searchQuery, setSearchQuery] = useState("");
  const [sortBy, setSortBy] = useState("insertion");
  const [statusFilter, setStatusFilter] = useState("all");
  const [groupBy, setGroupBy] = useState("none");
  const [showForm, setShowForm] = useState(false);
  const [editingMovie, setEditingMovie] = useState(null);
  const [detailMovie, setDetailMovie] = useState(null);
  const [showSettings, setShowSettings] = useState(false);
  const [showStats, setShowStats] = useState(false);
  const [showControls, setShowControls] = useState(false);

  useEffect(() => { 
      try {
          localStorage.setItem(KEY, JSON.stringify(movies)); 
      } catch(e) {
          if(e.name === 'QuotaExceededError') alert(t.quotaError);
      }
  }, [movies]);

  const getYTId = (url) => url?.match(/(?:youtu\.be\/|youtube\.com(?:\/embed\/|\/v\/|\/watch\?v=|\/watch\?.+&v=))([\w-]{11})/)?.[1];
  const getPoster = (m) => {
    if (m.poster) return m.poster;
    const yid = getYTId(m.link);
    return yid ? `https://img.youtube.com/vi/${yid}/hqdefault.jpg` : null;
  };

  const isSerie = (m) => (m.tipo || "").toLowerCase().includes("serie") || (m.tipo || "").toLowerCase().includes("tv");

  const hasMoviesInTab = movies.some(m => activeTab === "film" ? (!m.tipo || m.tipo.toLowerCase().includes("film")) : isSerie(m));

  const filtered = movies.filter(m => {
    const tabMatch = activeTab === "film" ? (!m.tipo || m.tipo.toLowerCase().includes("film")) : isSerie(m);
    const searchMatch = m.titolo.toLowerCase().includes(searchQuery.toLowerCase()) || m.regista?.toLowerCase().includes(searchQuery.toLowerCase());
    const statusMatch = statusFilter === "all" ? true : (statusFilter === "watched" ? m.visto : !m.visto);
    return tabMatch && searchMatch && statusMatch;
  });

  const sorted = [...filtered].sort((a, b) => {
    if (sortBy === "voto_desc") return (b.voto || 0) - (a.voto || 0);
    if (sortBy === "anno_asc") return (parseInt(a.anno) || 0) - (parseInt(b.anno) || 0);
    if (sortBy === "anno_desc") return (parseInt(b.anno) || 0) - (parseInt(a.anno) || 0);
    if (sortBy === "az") return (a.titolo || "").localeCompare(b.titolo || "");
    if (sortBy === "za") return (b.titolo || "").localeCompare(a.titolo || "");
    return 0; // Default insertion
  });

  const groups = (() => {
    if (sorted.length === 0) return []; 
    
    let effectiveGroupBy = groupBy;
    if (groupBy === "none") {
       if (sortBy === "az" || sortBy === "za") effectiveGroupBy = "letter";
       if (sortBy === "anno_asc" || sortBy === "anno_desc") effectiveGroupBy = "year";
    }

    if (effectiveGroupBy === "none") return [{ label: null, items: sorted }];
    
    const map = {};
    const others = [];
    sorted.forEach(m => {
      let key = null;
      if (effectiveGroupBy === "saga") key = m.serie?.trim();
      else if (effectiveGroupBy === "genre") key = m.genere?.split(',')[0]?.trim();
      else if (effectiveGroupBy === "director") key = m.regista?.trim();
      else if (effectiveGroupBy === "actor") key = m.cast?.split(',')[0]?.trim();
      else if (effectiveGroupBy === "year") key = m.anno?.toString().trim();
      else if (effectiveGroupBy === "letter") {
         const firstChar = (m.titolo || "?").charAt(0).toUpperCase();
         key = firstChar.match(/[A-Z0-9]/i) ? firstChar : "#";
      }

      if (key) { if (!map[key]) map[key] = []; map[key].push(m); } else others.push(m);
    });
    
    let keys = Object.keys(map);
    if (effectiveGroupBy === "year") {
       keys.sort((a, b) => sortBy === "anno_asc" ? parseInt(a) - parseInt(b) : parseInt(b) - parseInt(a));
    } else if (effectiveGroupBy === "letter") {
       keys.sort((a, b) => sortBy === "za" ? b.localeCompare(a) : a.localeCompare(b));
    } else {
       keys.sort(); 
    }

    const res = keys.map(k => {
       let displayLabel = k;
       if (effectiveGroupBy === "year") displayLabel = `📅 ${k}`;
       if (effectiveGroupBy === "letter") displayLabel = `🔠 ${k}`;
       return { label: displayLabel, items: map[k] };
    });

    if (others.length) res.push({ label: t.none, items: others });
    return res;
  })();

  const handleSave = (movieData) => {
    if (editingMovie) {
      setMovies(prev => prev.map(m => m.id === editingMovie.id ? { ...movieData, id: m.id } : m));
    } else {
      setMovies(prev => [{ ...movieData, id: generateSafeId() }, ...prev]);
    }
    if (movieData.tipo) {
       setActiveTab(movieData.tipo === 'film' ? 'film' : 'serie');
    }
    setShowForm(false);
    setEditingMovie(null);
  };

  const handleImport = (file, append) => {
    const reader = new FileReader();
    reader.onload = e => {
      try {
        const data = JSON.parse(e.target.result);
        if (Array.isArray(data)) {
          const cleanData = data.map(m => ({
            ...m,
            id: m.id || generateSafeId(),
            tipo: (m.tipo || "").toLowerCase().includes("serie") || (m.tipo || "").toLowerCase().includes("tv") ? "serie" : "film"
          }));
          if (append) {
             const existingIds = new Set(movies.map(m => m.titolo + m.anno));
             const newData = cleanData.filter(m => !existingIds.has(m.titolo + m.anno));
             setMovies([...movies, ...newData]);
             alert(`Aggiunti ${newData.length} titoli.`);
          } else {
             setMovies(cleanData);
             alert("Database sostituito.");
          }
        }
      } catch(err) { alert("File non valido"); }
    };
    reader.readAsText(file);
  };

  const openFormNew = () => {
    setEditingMovie(null);
    setShowForm(true);
  };

  return (
    <div style={{maxWidth:'900px', margin:'0 auto', animation:'fadeIn 0.5s ease', paddingBottom:'40px'}}>
      
      {/* NAVBAR */}
      <header style={{position:'sticky', top:0, zIndex:100, background:'rgba(10,10,15,0.96)', backdropFilter:'blur(12px)', borderBottom:'1px solid #1a1a28'}}>
         <div style={{padding:'12px 16px', display:'flex', alignItems:'center', gap:'10px'}}>
            <h1 style={{fontFamily:"'Playfair Display',serif", color:'#c9a84c', fontSize:'24px'}}>🎞️ {t.appTitle}</h1>
            <div style={{flex:1}}/>
            
            <button onClick={openFormNew} style={{background:'transparent', border:'none', color:'#c9a84c', display:'flex', alignItems:'center', justifyContent:'center', padding:'5px'}} title={t.add}>
               <svg width="24" height="24" viewBox="0 0 24 24" fill="none" stroke="currentColor" strokeWidth="2.5" strokeLinecap="round" strokeLinejoin="round">
                 <line x1="12" y1="5" x2="12" y2="19"></line>
                 <line x1="5" y1="12" x2="19" y2="12"></line>
               </svg>
            </button>
            <button onClick={() => setShowStats(true)} style={{background:'transparent', border:'none', fontSize:'18px', marginLeft:'8px', padding:'5px'}}>📊</button>
            <button onClick={() => setShowControls(!showControls)} style={{background:'transparent', border:'none', fontSize:'18px', color: showControls ? '#c9a84c' : '#555', marginLeft:'8px', padding:'5px'}}>🎛️</button>
            <button onClick={() => setShowSettings(true)} style={{background:'transparent', border:'none', fontSize:'18px', marginLeft:'8px', padding:'5px'}}>⚙️</button>
            <select value={lang} onChange={e => changeLang(e.target.value)} style={{background:'#13131a', border:'1px solid #2a2a3a', color:'#c9a84c', borderRadius:'6px', padding:'4px 6px', fontSize:'12px', marginLeft:'8px', cursor:'pointer'}}>
               <option value="it">🇮🇹</option>
               <option value="en">🇬🇧</option>
               <option value="de">🇩🇪</option>
               <option value="fr">🇫🇷</option>
               <option value="es">🇪🇸</option>
               <option value="pt">🇵🇹</option>
            </select>
         </div>
         
         <div style={{padding:'0 16px 12px'}}>
            <input className="input-field" placeholder={t.search} value={searchQuery} onChange={e => setSearchQuery(e.target.value)} style={{height:'42px', fontSize:'14px'}} />
         </div>

         {showControls && (
           <div style={{padding:'0 16px 12px', display:'flex', flexDirection:'column', gap:'12px', animation:'fadeUp 0.2s ease', borderTop:'1px solid #1a1a28', paddingTop:'12px'}}>
              <div style={{display:'flex', alignItems:'center', gap:'10px', overflowX:'auto', paddingBottom:'4px'}}>
                 <span className="filter-label">{t.sorting}</span>
                 <button onClick={() => setSortBy('insertion')} className={`chip ${sortBy==='insertion'?'active':''}`}>📅 {t.insertion}</button>
                 <button onClick={() => setSortBy('az')} className={`chip ${sortBy==='az'?'active':''}`}>🔤 {t.az}</button>
                 <button onClick={() => setSortBy('za')} className={`chip ${sortBy==='za'?'active':''}`}>🔠 {t.za}</button>
                 <button onClick={() => setSortBy('anno_asc')} className={`chip ${sortBy==='anno_asc'?'active':''}`}>▲ {t.year}</button>
                 <button onClick={() => setSortBy('anno_desc')} className={`chip ${sortBy==='anno_desc'?'active':''}`}>▼ {t.year}</button>
                 <button onClick={() => setSortBy('voto_desc')} className={`chip ${sortBy==='voto_desc'?'active':''}`}>🏆 {t.votoDesc}</button>
              </div>
              <div style={{display:'flex', alignItems:'center', gap:'10px', overflowX:'auto', paddingBottom:'4px'}}>
                 <span className="filter-label">{t.status}</span>
                 <button onClick={() => setStatusFilter('all')} className={`chip ${statusFilter==='all'?'active':''}`}>♾️ {t.all}</button>
                 <button onClick={() => setStatusFilter('watched')} className={`chip ${statusFilter==='watched'?'active':''}`}>✅ {t.watched}</button>
                 <button onClick={() => setStatusFilter('toWatch')} className={`chip ${statusFilter==='toWatch'?'active':''}`}>👁️ {t.toWatch}</button>
              </div>
              <div style={{display:'flex', alignItems:'center', gap:'10px', overflowX:'auto', paddingBottom:'4px'}}>
                 <span className="filter-label">{t.grouping}</span>
                 <button onClick={() => setGroupBy('none')} className={`chip ${groupBy==='none'?'active':''}`}>✖ {t.none}</button>
                 <button onClick={() => setGroupBy('saga')} className={`chip ${groupBy==='saga'?'active':''}`}>📺 {t.bySaga}</button>
                 <button onClick={() => setGroupBy('genre')} className={`chip ${groupBy==='genre'?'active':''}`}>🎭 {t.byGenre}</button>
                 <button onClick={() => setGroupBy('director')} className={`chip ${groupBy==='director'?'active':''}`}>🎬 {t.director}</button>
                 <button onClick={() => setGroupBy('actor')} className={`chip ${groupBy==='actor'?'active':''}`}>⭐ {t.actor}</button>
              </div>
           </div>
         )}

         <div style={{display:'flex'}}>
            <button className={`tab-btn ${activeTab === 'film' ? 'active' : ''}`} onClick={() => setActiveTab('film')}>🎬 {t.movies}</button>
            <button className={`tab-btn ${activeTab === 'serie' ? 'active' : ''}`} onClick={() => setActiveTab('serie')}>📺 {t.series}</button>
         </div>
      </header>

      {/* MAIN GRID */}
      <main style={{padding:'20px'}}>
         
         {groups.length === 0 ? (
            hasMoviesInTab ? (
               <div style={{textAlign:'center', padding:'50px 20px', color:'#888', background:'#13131a', borderRadius:'12px', border:'1px dashed #2a2a3a', animation:'fadeIn 0.3s'}}>
                  <div style={{fontSize:'48px', marginBottom:'15px', opacity:0.5}}>🔍</div>
                  <h3 style={{color:'#c9a84c', marginBottom:'8px', fontFamily:"'Playfair Display',serif", fontSize:'20px'}}>{t.noResultsTitle}</h3>
                  <p style={{fontSize:'14px', marginBottom:'20px', lineHeight:'1.5'}}>{t.noResultsDesc}</p>
                  <button onClick={() => {setSearchQuery(""); setStatusFilter("all"); setGroupBy("none"); setSortBy("insertion");}} className="btn-ghost" style={{padding:'10px 24px', borderRadius:'8px', margin:'0 auto'}}>
                     {t.resetFilters}
                  </button>
               </div>
            ) : (
               <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(145px, 1fr))', gap:'20px'}}>
                  <div className="placeholder-card" onClick={openFormNew}>
                     {activeTab === 'film' ? <FilmStripIcon /> : <TVIcon />}
                     <div style={{fontSize:'13px', fontWeight:'600', letterSpacing:'0.5px', textTransform:'uppercase'}}>
                       {activeTab === 'film' ? t.addMovie : t.addSeries}
                     </div>
                     <div style={{fontSize:'10px', marginTop:'8px', opacity:0.6}}>{t.noMovies}</div>
                  </div>
               </div>
            )
         ) : (
           groups.map((g, idx) => (
             <div key={idx} style={{marginBottom:'35px'}}>
                {g.label && (
                  <div style={{display:'flex', alignItems:'center', gap:'10px', marginBottom:'15px', borderBottom:'1px solid #1a1a28', paddingBottom:'8px'}}>
                     <h2 style={{fontFamily:"'Playfair Display',serif", fontSize:'18px', color:'#c9a84c'}}>{g.label}</h2>
                     <span style={{fontSize:'12px', color:'#333'}}>{g.items.length}</span>
                  </div>
                )}
                <div style={{display:'grid', gridTemplateColumns:'repeat(auto-fill, minmax(145px, 1fr))', gap:'20px'}}>
                   
                   {g.items.map(m => (
                     <div key={m.id} className="card" onClick={() => setDetailMovie(m)}>
                        <div style={{aspectRatio:'2/3', background:'#111'}}>
                           <img src={getPoster(m)} style={{width:'100%', height:'100%', objectFit:'cover'}} onError={(e) => { e.target.onerror = null; e.target.src="https://placehold.co/300x450/111/555?text=No+Poster"; }} />
                           {m.visto && <div style={{position:'absolute', top:'6px', right:'6px', background:'#c9a84c', color:'#000', fontSize:'10px', fontWeight:'bold', padding:'2px 5px', borderRadius:'4px', zIndex:2}}>✓</div>}
                        </div>
                        <div style={{padding:'10px'}}>
                           <div style={{fontSize:'13px', fontWeight:'600', whiteSpace:'nowrap', overflow:'hidden', textOverflow:'ellipsis'}}>{m.titolo}</div>
                           <div style={{fontSize:'11px', color:'#555'}}>{m.anno} {m.voto > 0 && ` • ★${m.voto}`}</div>
                        </div>
                     </div>
                   ))}
                </div>
             </div>
           ))
         )}
      </main>

      {/* STATS MODAL */}
      {showStats && (
        <div className="modal-overlay" onClick={() => setShowStats(false)}>
           <div className="modal-content" onClick={e => e.stopPropagation()} style={{padding:'24px', maxWidth:'440px', border:'1px solid rgba(201,168,76,0.3)'}}>
              <div style={{display:'flex', justifyContent:'space-between', marginBottom:'20px'}}><h2 style={{color:'#c9a84c', fontFamily:"'Playfair Display',serif", fontSize:'22px'}}>📊 {t.stats}</h2><button onClick={() => setShowStats(false)} className="close-btn">✕</button></div>
              <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'15px'}}>
                 <div className="stat-card"><div style={{fontSize:'26px', fontWeight:'bold'}}>{movies.length}</div><div className="meta-label">{t.totalItems}</div></div>
                 <div className="stat-card"><div style={{fontSize:'26px', fontWeight:'bold', color:'#4caf50'}}>{movies.filter(m=>m.visto).length}</div><div className="meta-label">{t.watched}</div></div>
                 <div className="stat-card"><div style={{fontSize:'26px', fontWeight:'bold', color:'#c9a84c'}}>{(movies.filter(m=>m.voto>0).reduce((a,b)=>a+b.voto,0) / (movies.filter(m=>m.voto>0).length || 1)).toFixed(1)} ★</div><div className="meta-label">{t.avgRating}</div></div>
                 <div className="stat-card" style={{display:'flex', flexDirection:'column', justifyContent:'center'}}><div style={{fontSize:'11px', fontWeight:'bold', textAlign:'center'}}>🎬 {movies.filter(m=>!isSerie(m)).length} {t.movies}<br/>📺 {new Set(movies.filter(isSerie).map(m=>m.serie?.toLowerCase())).size} {t.series}</div></div>
              </div>
              <button onClick={() => setShowStats(false)} className="btn-gold" style={{width:'100%', marginTop:'20px', padding:'12px', borderRadius:'10px'}}>OK</button>
           </div>
        </div>
      )}

      {/* MODALE SETTINGS */}
      {showSettings && (
        <div className="modal-overlay" onClick={() => setShowSettings(false)}>
           <div className="modal-content" onClick={e => e.stopPropagation()} style={{padding:'24px', maxWidth:'450px', border:'1px solid rgba(201,168,76,0.3)'}}>
              <div style={{display:'flex', justifyContent:'space-between', marginBottom:'20px'}}>
                  <h2 style={{color:'#c9a84c', fontFamily:"'Playfair Display',serif", fontSize:'22px'}}>⚙️ {t.settings}</h2>
                  <button onClick={() => setShowSettings(false)} className="close-btn">✕</button>
              </div>
              
              <div className="stat-card" style={{textAlign:'left', padding:'20px'}}>
                 <h3 className="meta-label" style={{marginBottom:'15px', color:'#c9a84c'}}>📦 {t.backupTitle}</h3>
                 <button className="btn-gold" style={{width:'100%', padding:'12px', borderRadius:'8px', marginBottom:'10px'}} onClick={() => { const blob = new Blob([JSON.stringify(movies)], {type:'application/json'}); const url = URL.createObjectURL(blob); const a = document.createElement('a'); a.href = url; a.download="framevault-backup.json"; a.click(); }}>⬇ {t.export}</button>
                 <div style={{display:'grid', gridTemplateColumns:'1fr 1fr', gap:'10px'}}>
                     <button onClick={() => { const inp = document.createElement('input'); inp.type='file'; inp.accept='.json'; inp.onchange = e => handleImport(e.target.files[0], false); inp.click(); }} className="chip">Sostituisci</button>
                     <button onClick={() => { const inp = document.createElement('input'); inp.type='file'; inp.accept='.json'; inp.onchange = e => handleImport(e.target.files[0], true); inp.click(); }} className="chip">Aggiungi</button>
                 </div>
              </div>
              
              <div className="stat-card" style={{textAlign:'left', padding:'20px', marginTop:'16px'}}>
                 <h3 className="meta-label" style={{marginBottom:'12px', color:'#c9a84c'}}>🔑 {t.tmdbKey}</h3>
                 <input
                   className="input-field"
                   type="password"
                   placeholder="Incolla qui la tua API Key TMDB..."
                   defaultValue={localStorage.getItem('framevault-tmdb-key') || ''}
                   onChange={e => localStorage.setItem('framevault-tmdb-key', e.target.value.trim())}
                 />
                 <p style={{fontSize:'10px', color:'#555', marginTop:'6px', lineHeight:'1.5'}}>Ottieni la chiave su <a href="https://www.themoviedb.org/settings/api" target="_blank" rel="noopener noreferrer" style={{color:'#c9a84c'}}>themoviedb.org/settings/api</a></p>
              </div>

              <div className="stat-card" style={{textAlign:'left', padding:'20px', marginTop:'16px', border:'1px solid rgba(220, 53, 69, 0.3)', background:'rgba(220, 53, 69, 0.05)'}}>
                 <h3 className="meta-label" style={{marginBottom:'15px', color:'#dc3545'}}>⚠️ {t.dangerZone}</h3>
                 <button onClick={() => { if(window.confirm(t.confirmClearAll)) { setMovies([]); setShowSettings(false); } }} style={{width:'100%', background:'transparent', border:'1px solid #dc3545', color:'#dc3545', padding:'12px', borderRadius:'8px', fontSize:'13px', fontWeight:'bold', transition:'all 0.2s', cursor:'pointer'}}>🗑️ {t.clearAll}</button>
              </div>

              <div style={{textAlign: 'center', marginTop: '20px', color: '#555', fontSize: '11px', letterSpacing: '1px', textTransform: 'uppercase'}}>
                 FrameVault v1.0
              </div>
           </div>
        </div>
      )}
      
      {/* MODALE FORM SGANCATO */}
      {showForm && <MovieForm onSave={handleSave} onClose={() => {setShowForm(false); setEditingMovie(null);}} initialData={editingMovie} lang={lang} activeTab={activeTab} />}
      
      {/* MODALE DETAIL */}
      {detailMovie && (
        <div className="modal-overlay" onClick={() => setDetailMovie(null)}>
          <div className="modal-content" onClick={e => e.stopPropagation()} style={{border:'1px solid rgba(201,168,76,0.3)'}}>
            <img src={getPoster(detailMovie)} style={{width:'100%', maxHeight:'40vh', objectFit:'cover'}} onError={(e) => { e.target.onerror = null; e.target.src="https://placehold.co/300x450/111/555?text=No+Poster"; }} />
            <div style={{padding:'20px'}}>
               <div style={{display:'flex', gap:'5px', marginBottom:'10px'}}>{detailMovie.genere?.split(',').map(g => <span key={g} className="tag">{g.trim()}</span>)}</div>
               <h2 style={{fontFamily:"'Playfair Display',serif", fontSize:'26px'}}>{detailMovie.titolo}</h2>
               <p style={{color:'#c9a84c', fontSize:'14px', marginBottom:'12px'}}>{detailMovie.regista} • {detailMovie.anno} • {detailMovie.durata}</p>
               {detailMovie.cast && <p style={{fontSize:'12px', color:'#777', marginBottom:'15px'}}><span className="meta-label" style={{display:'inline'}}>Cast:</span> {detailMovie.cast}</p>}
               {detailMovie.voto > 0 && <StarRating value={detailMovie.voto} readonly={true} size={18} />}
               <p style={{fontSize:'14px', color:'#aaa', marginTop:'15px', lineHeight:'1.6'}}>{detailMovie.trama}</p>
               {detailMovie.note && <div style={{background:'rgba(201,168,76,0.05)', padding:'12px', borderLeft:'3px solid #c9a84c', marginTop:'20px', fontStyle:'italic'}}>{detailMovie.note}</div>}
               <div style={{display:'flex', gap:'10px', marginTop:'25px'}}>
                  {detailMovie.link && <a href={detailMovie.link} target="_blank" rel="noopener noreferrer" className="btn-gold" style={{flex:1, padding:'10px', borderRadius:'8px', textDecoration:'none', textAlign:'center'}}>▶ {t.watchBtn}</a>}
                  <button onClick={() => { setEditingMovie(detailMovie); setShowForm(true); setDetailMovie(null); }} className="btn-ghost" style={{flex:1, padding:'10px', borderRadius:'8px'}}>✏️ Modifica</button>
                  <button onClick={() => { if(window.confirm(t.confirmDelete)) { setMovies(movies.filter(m => m.id !== detailMovie.id)); setDetailMovie(null); } }} style={{color:'#844', background:'transparent', border:'none', padding:'10px'}}>Elimina</button>
               </div>
            </div>
          </div>
        </div>
      )}
    </div>
  );
};

ReactDOM.createRoot(document.getElementById("root")).render(<App/>);
</script>
<!-- REGISTRAZIONE SERVICE WORKER -->
<script>
  if ('serviceWorker' in navigator) {
    window.addEventListener('load', () => {
      if (location.protocol.startsWith('http')) {
        navigator.serviceWorker.register('./sw.js').then(reg => {
          console.log('SW Registrato con successo!');
        }).catch(err => {
          console.log('Errore SW:', err);
        });
      }
    });
  }
</script>

</body>
</html>
